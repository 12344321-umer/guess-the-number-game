<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guess The Number!</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="header">
      <button class="again">Again!</button>
      <h1>Guess The Number</h1>
      <p>Between 1 and 20</p>
    </div>

    <p class="mystery-box">?</p>

    <div class="container">
      <div class="guess-section">
        <input type="number" id="guess-input" max="20" min="1" />
        <button class="check-btn">Guess!</button>
      </div>
      <div class="results">
        <p class="message">Start Guessing...</p>
        <p>💯 Guess Left : <span class="score">20</span></p>
        <p>🥇 Highscore : <span class="highscore">0</span></p>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
